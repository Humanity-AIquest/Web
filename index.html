<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1F3A" />
    <title>Humanity-AI.Quest — The Constitutional OS for Humanity</title>
    <meta name="description" content="The Hippocratic Oath for AI. 52 living clauses. Every innovator paired with their own agent. Gifted to humanity, owned by no one." />
    <meta property="og:title" content="Humanity-AI.Quest" />
    <meta property="og:description" content="The constitutional operating system for a planet that refuses to be ruled." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://humanity-ai.quest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              void: '#0F1F3A',
              'void-2': '#141F35',
              cosmos: '#1A2F4A',
              bone: '#FFFFFF',
              'bone-dim': '#E8E8E8',
              aurora: '#FFD60A',
              'aurora-deep': '#F0C000',
              gold: '#FFD60A',
              bronze: '#CC9000',
              terra: '#D4A574',
              forest: '#234555',
              'forest-2': '#2A5A6A',
              dust: '#8B8B8B',
            },
            fontFamily: {
              display: ['Fraunces', 'Times New Roman', 'serif'],
              body: ['Manrope', 'system-ui', 'sans-serif'],
            },
            animation: {
              'pulse-soft': 'pulse-soft 3s ease-in-out infinite',
              'drift': 'drift 14s ease-in-out infinite',
              'fade-up': 'fade-up 0.9s cubic-bezier(0.2, 0.7, 0.3, 1) both',
              'glow-breathe': 'glow-breathe 4s ease-in-out infinite',
              'orbit': 'orbit 12s linear infinite',
              'converge': 'converge 8s ease-in-out infinite',
              'pulse-unity': 'pulse-unity 4s ease-in-out infinite',
            },
            keyframes: {
              'pulse-soft': {
                '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                '50%': { opacity: '1', transform: 'scale(1.15)' },
              },
              'drift': {
                '0%, 100%': { transform: 'translate(0, 0)' },
                '33%': { transform: 'translate(8px, -6px)' },
                '66%': { transform: 'translate(-6px, 4px)' },
              },
              'fade-up': {
                'from': { opacity: '0', transform: 'translateY(24px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              },
              'glow-breathe': {
                '0%, 100%': { filter: 'drop-shadow(0 0 8px rgba(255, 214, 10, 0.4))' },
                '50%': { filter: 'drop-shadow(0 0 24px rgba(255, 214, 10, 0.85))' },
              },
              'orbit': {
                '0%': { transform: 'rotate(0deg) translateX(60px) rotate(0deg)' },
                '100%': { transform: 'rotate(360deg) translateX(60px) rotate(-360deg)' },
              },
              'converge': {
                '0%, 100%': { transform: 'translate(0, 0)', opacity: '0.3' },
                '50%': { transform: 'scale(1.3)', opacity: '0.8' },
              },
              'pulse-unity': {
                '0%, 100%': { transform: 'scale(1)', opacity: '0.5' },
                '50%': { transform: 'scale(1.2)', opacity: '1' },
              },
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-void text-bone">
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
